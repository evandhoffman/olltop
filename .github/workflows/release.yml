name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14  # arm64 Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build arm64
        env:
          CGO_ENABLED: "1"
          GOARCH: arm64
        run: |
          VERSION="${GITHUB_REF_NAME}"
          go build -ldflags "-X main.version=${VERSION}" -o olltop-darwin-arm64 ./cmd/olltop

      - name: Verify arm64 binary
        run: ./olltop-darwin-arm64 --version

      - name: Package as tgz
        run: tar czf olltop-darwin-arm64.tgz olltop-darwin-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: olltop-darwin-arm64
          path: olltop-darwin-arm64.tgz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: |
            ## Installation

            **Requires macOS on Apple Silicon (arm64).** Download, extract, and run:

            ```bash
            tar xzf olltop-darwin-arm64.tgz
            sudo ./olltop-darwin-arm64
            ```

            Running without `sudo` works but disables tok/s monitoring (requires pcap).
          files: |
            artifacts/olltop-darwin-arm64/olltop-darwin-arm64.tgz
